# Deploy static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea3d69b2d980b5e1dd5 # v4.2.2
      - name: Setup Pages
        uses: actions/configure-pages@981774dbcdbaac5e8e6b6b7e8e0d6bb738722089 # v5.0.0
      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74203658a438fb0f94237c8612bfc4 # v3.0.1
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0cca621ca46d8ed # v4.0.5
